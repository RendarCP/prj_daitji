<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DAITJI 오프라인</title>
    <meta name="theme-color" content="#0b1112" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1112;
        --card: #121a1b;
        --border: #1f2b2d;
        --text: #eef4f0;
        --muted: #93a39a;
        --accent: #24c36b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(36, 195, 107, 0.14), transparent 34%),
          var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      main {
        width: min(100%, 440px);
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: rgba(18, 26, 27, 0.92);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.32);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.75rem;
      }

      p {
        margin: 0 0 18px;
        line-height: 1.6;
        color: var(--muted);
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border-radius: 999px;
        background: var(--accent);
        color: #08110c;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>오프라인 상태입니다</h1>
      <p>네트워크가 다시 연결되면 최신 데이터가 동기화됩니다. 연결 후 다시 시도해 주세요.</p>
      <a href="/dashboard">대시보드로 돌아가기</a>
    </main>
  </body>
</html>
